name: ci
on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
  schedule:
  - cron: '00 01 * * *'

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.build }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - build: linux
          os: ubuntu-latest
          rust: stable
        - build: macos
          os: macos-latest
          rust: stable
        - build: windows
          os: windows-latest
          rust: stable
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
    - name: Build (no default features)
      run: cargo build --verbose --no-default-features
    - name: Build (all features)
      run: cargo build --verbose --all-features
    - name: Tests (no default, lib only)
      run: cargo test --verbose --no-default-features --lib
    - name: Tests (all features)
      run: cargo test --verbose --all-features

  no-std:
    name: no_std (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
        - thumbv7em-none-eabihf   # Cortex-M4/M7
        - thumbv6m-none-eabi      # Cortex-M0/M0+
        - armv7a-none-eabi        # Cortex-A (bare metal)
        - armv7r-none-eabihf      # Cortex-R
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Build (no default features)
      run: cargo build --verbose --no-default-features --target ${{ matrix.target }}
    - name: Build (embedded-io)
      run: cargo build --verbose --features embedded-io --target ${{ matrix.target }}
    - name: Build (embedded-io-async)
      run: cargo build --verbose --features embedded-io-async --target ${{ matrix.target }}

  miri:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: miri
    - name: Run tests
      run: cargo miri test --verbose --all-features

  rustfmt:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - name: Check formatting
      run: cargo fmt -- --check
